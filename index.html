    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .modal { display: none; }
        .modal.active { display: flex; }
        .cart-modal { display: none; }
        .cart-modal.active { display: flex; }
        .filter-btn.active { background-color: #000; color: #fff; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <nav class="bg-white shadow-sm sticky top-0 z-40 p-4 border-b">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-gray-900 tracking-tighter italic">MarIv & CO.</h1>
            <button onclick="toggleCart()" class="relative p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition">
                <i class="fas fa-shopping-bag text-xl"></i>
                <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 pt-8">
        <div class="flex flex-col gap-4 mb-8">
            <input type="text" id="searchInput" placeholder="Buscar modelos..." class="p-4 rounded-xl w-full border border-gray-200 focus:ring-2 focus:ring-black outline-none shadow-sm">
            
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="flex gap-2 overflow-x-auto pb-2 w-full md:w-auto">
                    <button onclick="setFilter('all')" id="btn-all" class="filter-btn active px-4 py-2 rounded-full border border-gray-300 text-sm font-bold whitespace-nowrap">Todos</button>
                    <button onclick="setFilter('girls')" id="btn-girls" class="filter-btn px-4 py-2 rounded-full border border-gray-300 text-sm font-bold whitespace-nowrap">Niñas</button>
                    <button onclick="setFilter('boys')" id="btn-boys" class="filter-btn px-4 py-2 rounded-full border border-gray-300 text-sm font-bold whitespace-nowrap">Niños</button>
                    <button onclick="setFilter('woman')" id="btn-woman" class="filter-btn px-4 py-2 rounded-full border border-gray-300 text-sm font-bold whitespace-nowrap">Mujer</button>
                    <button onclick="setFilter('men')" id="btn-men" class="filter-btn px-4 py-2 rounded-full border border-gray-300 text-sm font-bold whitespace-nowrap">Caballero</button>
                    <button onclick="setFilter('tenis')" id="btn-tenis" class="filter-btn px-4 py-2 rounded-full border border-gray-300 text-sm font-bold whitespace-nowrap">Tenis</button>
                </div>
                
                <div class="w-full md:w-48">
                    <select id="sizeFilter" onchange="renderProducts(document.getElementById('searchInput').value)" class="p-3 rounded-xl w-full border border-gray-200 bg-white text-sm font-bold focus:ring-2 focus:ring-black outline-none shadow-sm cursor-pointer">
                        <option value="all">Todas las tallas</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </main>

    <script>
        const whatsappNumber = "525638737731"; 
        let currentFilter = 'all';
        
        // Base de datos con IDs únicos para evitar errores de selección
        const productsData = [
            { id: 1, name: "Balerina Lulú", category: "woman", material: "Sintético", price: 300, heroImage: "https://i.ibb.co/rK3hx71H/VALERINA-LISO-1-CORREA-NI-A.png", sizes: [24, 26] },
            { id: 2, name: "Escolar Moño", category: "girls", material: "Piel", price: 450, heroImage: "https://i.ibb.co/7tk4ffdZ/535-HEBILLA-MO-O-PIEL-NI-A.png", sizes: [19.5, 20, 21.5] },
            { id: 3, name: "Escolar BS 2 (Niños)", category: "boys", material: "Piel", price: 450, heroImage: "https://i.ibb.co/gZHcDwyF/316-2-CORREAS-PIEL-NI-O.jpg", sizes: [17, 20] },
            { id: 32, name: "Escolar BS 2 (Caballero)", category: "men", material: "Piel", price: 450, heroImage: "https://i.ibb.co/hGm02Cb/0c56947d-2290-4d0d-a227-5f9d2df6fac9.png", sizes: [23, 24, 25.5] },
            { id: 4, name: "Escolar Bs 1a", category: "boys", material: "Piel", price: 450, heroImage: "https://i.ibb.co/hJw3hfQM/306-CORDON-PIEL-NI-O.jpg", sizes: [16, 17.5, 18, 20.5, 21] },
            { id: 5, name: "Escolar BS 1 (Niños)", category: "boys", material: "Piel", price: 450, heroImage: "https://i.ibb.co/997Lq1BF/206-1-CORREA-PIEL-NI-O.jpg", sizes: [16, 17] },
            { id: 52, name: "Escolar BS 1 (Caballero)", category: "men", material: "Piel", price: 450, heroImage: "https://i.ibb.co/S79TLjQS/fbbadaf5-cdd5-4e86-b4cd-f261dc86dec2.png", sizes: [22.5, 23.5, 24] },
            { id: 6, name: "Italia Flor", category: "girls", material: "Piel", price: 450, heroImage: "https://i.ibb.co/Y4Wy7jMN/101-1-CORREA-FLOR-PIEL-NI-A.png", sizes: [15, 15.5, 16, 17, 17.5, 19.5] },
            { id: 7, name: "Italia Diamante", category: "girls", material: "Piel", price: 450, heroImage: "https://i.ibb.co/V04tS8MB/106-DIAMANTITO-PIEL-NI-A.png", sizes: [20, 21] },
            { id: 8, name: "Dumas Charol", category: "woman", material: "Sintético", price: 450, heroImage: "https://i.ibb.co/RGX2gXVJ/DUMAS-CHAROL.png", sizes: [23, 25, 26] },
            { id: 9, name: "Flats Yayis Beige", category: "woman", material: "Sintético", price: 350, heroImage: "https://i.ibb.co/JRRqH7zW/VALERINA-PUNTA-BEIGE.png", sizes: [23, 24, 25] },
            { id: 10, name: "Flats Yayis Negro", category: "woman", material: "Sintético", price: 350, heroImage: "https://i.ibb.co/yn7qKMnd/VALERINA-PUNTA-NEGRO.png", sizes: [23, 24, 25] },
            { id: 11, name: "Balerina Dulce", category: "woman", material: "Sintético", price: 300, heroImage: "https://i.ibb.co/Kx32Smyw/VALERINA-C-CORREA.png", sizes: [24, 26] },
            { id: 12, name: "Tiza Casual Verde Militar", category: "woman", material: "Textil", price: 500, heroImage: "https://i.ibb.co/xWV6nkN/TIZA-VERDE-MILITAR.png", sizes: [23, 24.5, 25.5, 26] },
            { id: 13, name: "Tiza Casual Camel", category: "woman", material: "Textil", price: 500, heroImage: "https://i.ibb.co/KxkFxW3X/TIZA-CAMEL.jpg", sizes: [24, 25.5] },
            { id: 14, name: "Sandalia Mariv3 Café", category: "woman", material: "Sintético", price: 240, heroImage: "https://i.ibb.co/v6SkVwDb/SANDALIA-3-TIRAS-CAFE.png", sizes: [25] },
            { id: 15, name: "Dumas Negro", category: "woman", material: "Sintético", price: 450, heroImage: "https://i.ibb.co/cKcTVw5D/DUMAS-NGRO-DAMA.png", sizes: [23.5, 24.5, 25.5] },
            { id: 16, name: "Nairobi Casual Negro", category: "woman", material: "Textil", price: 500, heroImage: "https://i.ibb.co/QvdB3LG1/NAIROBI-NGO.jpg", sizes: [22.5, 23, 23.5, 24.5] },
            { id: 17, name: "Tenis Or01 Blanco/Rojo", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/Kprv2hgd/jordan-retro-1-bco-rj-ngo.jpg", sizes: [26] },
            { id: 18, name: "Tenis Or01 Gris", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/1GcGpycs/jordan-retro-1-gris-bco-ngo-copia.jpg", sizes: [24.5] },
            { id: 19, name: "Tenis Or04 Blanco/Negro", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/VW1k3QyS/jordan-retro-4-bco-ngo-rj-copia.jpg", sizes: [27] },
            { id: 20, name: "Tenis Or04 Negro/Rojo", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/j9cd9byf/jordan-retro-4-ngo-rj-copia.jpg", sizes: [25.5] },
            { id: 21, name: "Tenis 04Ni50 Blanco", category: "tenis", material: "Sintético", price: 500, heroImage: "https://i.ibb.co/Q74cFBBM/NEW-BALANCE-BCO-NGO.jpg", sizes: [19] },
            { id: 22, name: "Tenis NB530 Beige", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/1t2p8M1m/NEW-BALANCE-BEIGE.jpg", sizes: [17, 21.5] },
            { id: 23, name: "Tenis 04Ni50 Blanco", category: "tenis", material: "Sintético", price: 500, heroImage: "https://i.ibb.co/Hp9bDDm8/NIKE-0450-BCO.jpg", sizes: [20.5, 21.5] },
            { id: 24, name: "Tenis A1F Blanco", category: "tenis", material: "Sintético", price: 500, heroImage: "https://i.ibb.co/C5BVJXwx/NIKE-0505-AF1-BCO.png", sizes: [22.5, 23, 25, 26] },
            { id: 25, name: "Tenis Sude XL Blanco", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/Kcv7BcT7/PUMA-SUEDE-XL-BCO.png", sizes: [23, 24.5, 25.5] },
            { id: 26, name: "Tenis Sude XL Café", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/Gv1ZCyj4/PUMA-SUEDE-XL-CAFE.png", sizes: [26.5] },
            { id: 27, name: "Tenis Sammba Blanco/Negro", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/YT0rj7h8/SAMBA-BCO-NGO.jpg", sizes: [26.5] },
            { id: 28, name: "Tenis Sammba Negro", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/JWwvj9J2/SAMBA-NGO.jpg", sizes: [25.5] },
            { id: 29, name: "Tenis Campus Lila c/flores", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/z1SNhLf/CAMPUS-LILA.png", sizes: [23.5, 24.5] },
            { id: 30, name: "Tenis Campus Negro", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/0yPPjSkV/CAMPUS-NGO.png", sizes: [24.5, 25.5] },
            { id: 31, name: "Tenis Campus Marino", category: "tenis", material: "Sintético", price: 550, heroImage: "https://i.ibb.co/RGm4W1pn/CAMPUS-MARINO.jpg", sizes: [23] }
        ];

        let cart = [];

        // Poblar dinámicamente el selector de tallas con todas las tallas únicas ordenadas
        function initSizeFilter() {
            const sizeSelect = document.getElementById('sizeFilter');
            const allSizes = new Set();
            productsData.forEach(p => p.sizes.forEach(s => allSizes.add(s)));
            const sortedSizes = Array.from(allSizes).sort((a, b) => a - b);
            
            sizeSelect.innerHTML = '<option value="all">Todas las tallas</option>';
            sortedSizes.forEach(size => {
                sizeSelect.innerHTML += `<option value="${size}">Talla ${size}</option>`;
            });
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${filter}`).classList.add('active');
            renderProducts(document.getElementById('searchInput').value);
        }

        function renderProducts(search = '') {
            const grid = document.getElementById('productGrid');
            const selectedSize = document.getElementById('sizeFilter').value;
            grid.innerHTML = '';
            
            const filtered = productsData.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(search.toLowerCase());
                const matchesCategory = (currentFilter === 'all' || p.category === currentFilter);
                const matchesSize = (selectedSize === 'all' || p.sizes.includes(parseFloat(selectedSize)));
                return matchesSearch && matchesCategory && matchesSize;
            });

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                        <img src="${p.heroImage}" class="w-full h-40 object-cover rounded-xl mb-3">
                        <h3 class="font-bold text-sm text-gray-800 truncate">${p.name}</h3>
                        <p class="text-green-600 font-semibold mb-3">$${p.price}</p>
                        <button onclick="openModal(${p.id})" class="w-full py-2 bg-black text-white rounded-lg text-sm font-bold">Ver Detalles</button>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const product = productsData.find(p => p.id === id);
            const size = document.getElementById('sizeSelector').value;
            
            if(!size) {
                alert("Por favor selecciona una talla");
                return;
            }

            cart.push({ ...product, selectedSize: size });
            closeModal();
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const list = document.getElementById('cartList');
            const subtotalEl = document.getElementById('subtotal');
            const totalEl = document.getElementById('cartTotal');
            
            list.innerHTML = '';
            let subtotal = 0;
            
            cart.forEach((item, index) => {
                subtotal += item.price;
                list.innerHTML += `
                    <div class="flex justify-between items-center py-2 border-b">
                        <div class="flex flex-col">
                            <span class="text-sm font-bold">${item.name}</span>
                            <span class="text-xs text-gray-500">Talla: ${item.selectedSize}</span>
                        </div>
                        <span class="font-bold">$${item.price}</span>
                        <button onclick="removeFromCart(${index})" class="text-red-500"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                `;
            });
            
            subtotalEl.innerText = `$${subtotal}`;
            totalEl.innerText = `$${subtotal} + Envío`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function checkout() {
            if(cart.length === 0) return;
            let message = "Hola, me interesa hacer un pedido:%0A";
            cart.forEach(item => message += `- ${item.name} (Talla: ${item.selectedSize}) - $${item.price}%0A`);
            
            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            
            message += `%0ASubtotal: $${subtotal}`;
            message += `%0AEnvío: Por cotizar`;
            message += `%0ATotal: $${subtotal} + Envío`;
            
            window.open(`https://wa.me/${whatsappNumber}?text=${message}`, '_blank');
        }

        function openModal(id) {
            const product = productsData.find(p => p.id === id);
            document.getElementById('modalImg').src = product.heroImage;
            document.getElementById('modalTitle').innerText = product.name;
            document.getElementById('modalPrice').innerText = "$" + product.price;
            document.getElementById('modalMaterial').innerText = "Material: " + product.material;
            
            const select = document.getElementById('sizeSelector');
            select.innerHTML = '<option value="">Selecciona una talla</option>';
            product.sizes.sort((a,b) => a-b).forEach(s => {
                select.innerHTML += `<option value="${s}">${s}</option>`;
            });

            document.getElementById('addBtn').onclick = () => addToCart(product.id);
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function toggleCart() { document.getElementById('cartModal').classList.toggle('active'); }

        document.getElementById('searchInput').addEventListener('input', (e) => renderProducts(e.target.value));
        
        // Inicializar filtros y catálogo al cargar
        initSizeFilter();
        renderProducts();
    </script>

    <div id="modal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full relative">
            <button onclick="closeModal()" class="absolute top-4 right-4"><i class="fas fa-times text-2xl"></i></button>
            <img id="modalImg" class="w-full h-64 object-cover rounded-2xl mb-4">
            <h2 id="modalTitle" class="text-2xl font-bold mb-1"></h2>
            <p id="modalMaterial" class="text-gray-600 text-sm mb-4"></p>
            <p id="modalPrice" class="text-green-600 font-bold text-xl mb-1"></p>
             
            <label class="block text-sm font-bold text-gray-700 mb-2">Selecciona tu talla:</label>
            <select id="sizeSelector" class="w-full p-3 border rounded-xl mb-6"></select>

            <button id="addBtn" class="w-full py-4 bg-black text-white rounded-xl font-bold hover:bg-gray-800 transition">Agregar al Carrito</button>
        </div>
    </div>

    <div id="cartModal" class="cart-modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full relative">
            <h2 class="text-xl font-bold mb-4">Tu Pedido</h2>
            <div id="cartList" class="mb-4 max-h-60 overflow-y-auto"></div>
            
            <div class="space-y-2 mb-6 border-t pt-4">
                <div class="flex justify-between text-sm"><span>Subtotal:</span><span id="subtotal">$0</span></div>
                <div class="flex justify-between text-sm text-gray-600"><span>Envío:</span><span id="shippingFee">Por cotizar</span></div>
                <div class="flex justify-between text-lg font-bold"><span>Total:</span><span id="cartTotal">$0 + Envío</span></div>
            </div>

            <button onclick="checkout()" class="w-full py-4 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition">Pedir por WhatsApp</button>
            <button onclick="toggleCart()" class="w-full py-2 mt-2 text-gray-500">Cerrar</button>
        </div>
    </div>
</body>
</html>
